<body>

  <script type="application/json" id="guide-data">__GUIDE_DATA__</script>
  <script id="guide-interactions">
  (() => {
    "use strict";
    const root = document.documentElement;
    root.classList.add("js");
    const dataNode = document.getElementById("guide-data");
    const data = dataNode ? JSON.parse(dataNode.textContent) : null;
    const prefersReduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    const safeStorage = {
      get(key) { try { return window.localStorage.getItem(key); } catch { return null; } },
      set(key, value) { try { window.localStorage.setItem(key, value); } catch { /* 本地存储不可用时保持页面可用 */ } },
    };

    const motionButton = document.getElementById("motion-toggle");
    const motionKey = `travel-guide-motion:${data?.meta?.slug || "default"}`;
    let motionEnabled = !prefersReduced && safeStorage.get(motionKey) !== "off";
    const syncMotion = () => {
      root.classList.toggle("reduce-motion", !motionEnabled);
      motionButton?.setAttribute("aria-pressed", String(motionEnabled));
      if (motionButton) motionButton.textContent = motionEnabled ? "动效开启" : "动效关闭";
    };
    syncMotion();
    motionButton?.addEventListener("click", () => {
      motionEnabled = !motionEnabled;
      safeStorage.set(motionKey, motionEnabled ? "on" : "off");
      syncMotion();
    });

    const revealTargets = Array.from(document.querySelectorAll(".section-heading, .quick-grid, .checklist-grid, .ticket-card, .day-card, .hotel-card, .food-card, .budget-layout, .weather-grid, .packing-grid, .source-grid"));
    revealTargets.forEach((element) => element.classList.add("reveal-target"));
    if (prefersReduced || !("IntersectionObserver" in window)) {
      revealTargets.forEach((element) => element.classList.add("visible"));
    } else {
      const revealObserver = new IntersectionObserver((entries, observer) => {
        entries.forEach((entry) => {
          if (!entry.isIntersecting) return;
          entry.target.classList.add("visible");
          observer.unobserve(entry.target);
        });
      }, { threshold: 0.08, rootMargin: "0px 0px -8% 0px" });
      revealTargets.forEach((element) => revealObserver.observe(element));
    }

    const progress = document.getElementById("scroll-progress");
    const backTop = document.getElementById("back-to-top") || document.getElementById("back-top");
    const updateScroll = () => {
      const height = document.documentElement.scrollHeight - window.innerHeight;
      const ratio = height > 0 ? Math.min(1, Math.max(0, window.scrollY / height)) : 0;
      if (progress) progress.style.transform = `scaleX(${ratio})`;
      backTop?.classList.toggle("visible", window.scrollY > 650);
    };
    updateScroll();
    window.addEventListener("scroll", updateScroll, { passive: true });
    backTop?.addEventListener("click", () => window.scrollTo({ top: 0, behavior: motionEnabled ? "smooth" : "auto" }));

    const sectionLinks = Array.from(document.querySelectorAll("[data-section-link]"));
    const sections = sectionLinks.map((link) => document.getElementById(link.dataset.sectionLink)).filter(Boolean);
    if ("IntersectionObserver" in window) {
      const activeObserver = new IntersectionObserver((entries) => {
        const visible = entries.filter((entry) => entry.isIntersecting).sort((a, b) => b.intersectionRatio - a.intersectionRatio)[0];
        if (!visible) return;
        sectionLinks.forEach((link) => link.classList.toggle("active", link.dataset.sectionLink === visible.target.id));
      }, { threshold: [0.15, 0.35, 0.6], rootMargin: "-20% 0px -60%" });
      sections.forEach((section) => activeObserver.observe(section));
    }

    const checklistKey = `travel-guide-checklist:${data?.meta?.slug || "default"}`;
    let checkedIds = [];
    try { checkedIds = JSON.parse(safeStorage.get(checklistKey) || "[]"); } catch { checkedIds = []; }
    document.querySelectorAll("[data-check-id]").forEach((input) => {
      input.checked = checkedIds.includes(input.dataset.checkId);
      input.addEventListener("change", () => {
        checkedIds = Array.from(document.querySelectorAll("[data-check-id]:checked")).map((item) => item.dataset.checkId);
        safeStorage.set(checklistKey, JSON.stringify(checkedIds));
      });
    });

    const budgetModes = data?.budget?.modes || [];
    const budgetButtons = Array.from(document.querySelectorAll("[data-budget-mode]"));
    const budgetLabel = document.getElementById("budget-label");
    const budgetTotal = document.getElementById("budget-total");
    const budgetNote = document.getElementById("budget-note");
    const budgetItems = document.getElementById("budget-items");
    const escapeText = (value) => String(value ?? "").replace(/[&<>"']/g, (character) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" })[character]);
    const selectBudget = (id) => {
      const mode = budgetModes.find((item) => item.id === id);
      if (!mode) return;
      budgetButtons.forEach((button) => button.setAttribute("aria-pressed", String(button.dataset.budgetMode === id)));
      if (budgetLabel) budgetLabel.textContent = mode.label;
      if (budgetTotal) budgetTotal.textContent = mode.total;
      if (budgetNote) budgetNote.textContent = mode.note || "";
      if (budgetItems) budgetItems.innerHTML = mode.items.map((item) => `<div><span>${escapeText(item.label)}</span><strong>${escapeText(item.amount)}</strong><i style="--weight:${Number(item.weight) || 0}%"></i></div>`).join("");
    };
    budgetButtons.forEach((button) => button.addEventListener("click", () => selectBudget(button.dataset.budgetMode)));

    const weatherButton = document.getElementById("weather-refresh");
    const weatherStatus = document.getElementById("weather-status");
    const weatherCode = (code) => {
      if (code === 0) return "晴";
      if ([1, 2].includes(code)) return "多云";
      if (code === 3) return "阴";
      if ([45, 48].includes(code)) return "雾";
      if ([51, 53, 55, 56, 57].includes(code)) return "毛毛雨";
      if ([61, 63, 65, 66, 67, 80, 81, 82].includes(code)) return "阵雨";
      if ([71, 73, 75, 77, 85, 86].includes(code)) return "雪";
      if ([95, 96, 99].includes(code)) return "雷阵雨";
      return "天气变化";
    };
    weatherButton?.addEventListener("click", async () => {
      if (!data?.weather) return;
      weatherButton.disabled = true;
      if (weatherStatus) weatherStatus.textContent = "正在刷新天气…";
      const params = new URLSearchParams({
        latitude: String(data.weather.latitude),
        longitude: String(data.weather.longitude),
        daily: "weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max",
        timezone: "auto",
        start_date: data.meta.startDate,
        end_date: data.meta.endDate,
      });
      try {
        const response = await fetch(`https://api.open-meteo.com/v1/forecast?${params}`, { headers: { accept: "application/json" } });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const payload = await response.json();
        const dates = payload?.daily?.time || [];
        dates.forEach((date, index) => {
          const card = document.querySelector(`[data-weather-date="${date}"]`);
          if (!card) return;
          const summary = card.querySelector("[data-weather-summary]");
          const high = card.querySelector("[data-weather-high]");
          const low = card.querySelector("[data-weather-low]");
          const rain = card.querySelector("[data-weather-rain]");
          if (summary) summary.textContent = weatherCode(payload.daily.weather_code[index]);
          if (high) high.textContent = Math.round(payload.daily.temperature_2m_max[index]);
          if (low) low.textContent = Math.round(payload.daily.temperature_2m_min[index]);
          if (rain) rain.textContent = Math.round(payload.daily.precipitation_probability_max[index] ?? 0);
        });
        if (weatherStatus) weatherStatus.textContent = `已刷新 · ${new Date().toLocaleString("zh-CN", { hour12: false })}`;
      } catch {
        if (weatherStatus) weatherStatus.textContent = "实时刷新暂不可用，已保留核实快照与数据来源入口。";
      } finally {
        weatherButton.disabled = false;
      }
    });
  })();
  </script>
</body>
</html>
