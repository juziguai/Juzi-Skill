name: Capability request
description: 建议新 Skill、插件或市场治理能力
title: "[Capability] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
    validations:
      required: true
  - type: dropdown
    id: kind
    attributes:
      label: 推荐类型
      options:
        - pure-skill
        - plugin
        - control-plane
        - unknown
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: 验收标准
    validations:
      required: true
