name: Validate marketplace

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-marketplace-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: ${{ matrix.os }} / Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - name: Compile control-plane Python
        run: python -m py_compile scripts/marketplace_registry.py scripts/manage_catalog.py scripts/validate_marketplace.py scripts/juzi_release.py
      - name: Run release-control failure tests
        run: python -m unittest discover -s scripts/tests -p "test_*.py" -v
      - name: Parse PowerShell release scripts
        shell: pwsh
        run: |
          $errors = @()
          Get-ChildItem -LiteralPath scripts -Filter '*.ps1' | ForEach-Object {
            $tokens = $null
            $parseErrors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$parseErrors) | Out-Null
            $errors += $parseErrors
          }
          if ($errors.Count -gt 0) {
            $errors | Format-List
            exit 1
          }
      - name: Run full marketplace preflight
        run: python scripts/juzi_release.py preflight --all --history --require-clean
