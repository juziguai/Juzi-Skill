name: Release marketplace

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Immutable tag, for example market-v2026.07.19.1"
        required: true
        type: string
      channel:
        description: "Release channel"
        required: true
        default: stable
        type: choice
        options: [stable, beta]
      source_ref:
        description: "Commit or ref to validate and publish"
        required: true
        default: main
        type: string
      publish:
        description: "Create tag/release and advance stable when all gates pass"
        required: true
        default: false
        type: boolean

permissions:
  actions: write
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.source_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
      - name: Validate release tag
        shell: pwsh
        run: |
          if ('${{ inputs.release_tag }}' -notmatch '^market-v\d{4}\.\d{2}\.\d{2}\.\d+$') {
            throw 'release_tag must match market-vYYYY.MM.DD.N'
          }
      - name: Run immutable candidate preflight
        shell: pwsh
        run: .\scripts\Test-JuziRelease.ps1 -Base 'HEAD^' -All -History -RequireClean -OutputPath '.codex/reports/preflight.json'
      - name: Generate release receipt
        shell: pwsh
        run: |
          python scripts/juzi_release.py receipt --channel ${{ inputs.channel }} --preflight .codex/reports/preflight.json --output .codex/reports/release-receipt.json
          python scripts/prepare_release_notes.py --tag ${{ inputs.release_tag }} --output .codex/reports/release-notes.md
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ inputs.release_tag }}-receipt
          path: .codex/reports/*
          if-no-files-found: error
      - name: Create annotated tag and GitHub Release
        if: ${{ inputs.publish }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = '${{ inputs.release_tag }}'
          git config user.name 'Codex'
          git config user.email 'codex@openai.com'
          if (git ls-remote --exit-code --tags origin "refs/tags/$tag") {
            throw "Tag already exists: $tag"
          }
          if ('${{ inputs.channel }}' -eq 'stable') {
            git push origin "HEAD:refs/heads/stable"
          }
          git tag -a $tag HEAD -m "Juzi Skill marketplace $tag"
          git push origin "refs/tags/$tag"
          $latest = @()
          if ('${{ inputs.channel }}' -eq 'stable') { $latest += '--latest' }
          gh release create $tag --verify-tag --title "Juzi Skill $tag" --notes-file .codex/reports/release-notes.md @latest
      - name: Dispatch stable validation
        if: ${{ inputs.publish && inputs.channel == 'stable' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run validate-marketplace.yml --ref stable
          gh workflow run codeql.yml --ref stable
